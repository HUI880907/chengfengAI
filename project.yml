name: ChengFengAI
options:
  bundleIdPrefix: com.chengfeng
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  groupSortPosition: none
  fileSortOrder: byName
  xcodeVersion: "15.0"
  tabWidth: 4
  indentWidth: 4
  swiftVersion: "5.9"
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    ENABLE_BITCODE: false
    GENERATE_INFOPLIST_FILE: NO
    CODE_SIGNING_ALLOWED: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: "Apple Development"
    SWIFT_STRICT_CONCURRENCY: minimal
    ENABLE_PREVIEWS: YES

configs:
  Debug:
    type: debug
  Release:
    type: release

targets:
  ChengFengAI:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: 乘风AI
        type: source
        excludes:
          - "**/*.md"
          - "**/.DS_Store"
          - "Info.plist"
          - "**/Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chengfeng.ai
        PRODUCT_NAME: "ChengFengAI"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        ARCHS: "$(ARCHS_STANDARD)"
        ONLY_ACTIVE_ARCH: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        INFOPLIST_FILE: 乘风AI/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_ALLOWED: YES
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: ""
      configs:
        Release:
          ONLY_ACTIVE_ARCH: NO
          CODE_SIGN_IDENTITY: "Apple Distribution"
    info:
      path: 乘风AI/Info.plist
      properties:
        CFBundleDisplayName: "乘风AI"
        CFBundleName: "ChengFengAI"
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        LSRequiresIPhoneOS: true

    buildRules: []
    dependencies: []
    preBuildScripts: []
    postCompileScripts: []
    postBuildScripts: []

schemes:
  ChengFengAI:
    build:
      targets:
        ChengFengAI: all
    test:
      config: Debug
      gatherCoverageData: true
      targets: []
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
      customArchiveName: "ChengFengAI"
      revealArchiveInOrganizer: true

groups:
  - 乘风AI
