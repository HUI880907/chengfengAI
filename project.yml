name: 乘风AI
options:
  bundleIdPrefix: com.chengfeng
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  groupSortPosition: none
  fileSortOrder: byName
  xcodeVersion: "15.0"
  tabWidth: 4
  indentWidth: 4
  swiftVersion: "5.9"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    ENABLE_BITCODE: false
    GENERATE_INFOPLIST_FILE: NO
    CODE_SIGNING_ALLOWED: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: "Apple Development"
    SWIFT_STRICT_CONCURRENCY: minimal
    ENABLE_PREVIEWS: YES

configs:
  Debug:
    type: debug
  Release:
    type: release

targets:
  乘风AI:
    type: application
    platform: iOS
    sources:
      - path: 乘风AI
        type: source
        excludes:
          - "**/*.md"
          - "**/.DS_Store"
          - "Info.plist"
          - "**/Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chengfeng.ai
        PRODUCT_NAME: "乘风AI"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTED_PLATFORMS_SUFFIX_MAPPING: ""
        ARCHS: "$(ARCHS_STANDARD)"
        ONLY_ACTIVE_ARCH: YES
        SWIFT_ACTIVE_COMPILE_CONDITIONS: "DEBUG $(inherited)"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        INFOPLIST_FILE: 乘风AI/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_ALLOWED: YES
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: ""
        PROVISIONING_PROFILE_SPECIFIER: ""
      configs:
        Release:
          ONLY_ACTIVE_ARCH: NO
          SWIFT_ACTIVE_COMPILE_CONDITIONS: "RELEASE $(inherited)"
          CODE_SIGN_IDENTITY: "Apple Distribution"

  乘风AITests:
    type: unit-tests
    platform: iOS
    sources:
      - path: Tests
        type: source
        excludes:
          - "**/*.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chengfeng.ai.tests
        PRODUCT_NAME: "乘风AITests"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/乘风AI.app/乘风AI"
        BUNDLE_LOADER: "$(TEST_HOST)"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @loader_path/Frameworks"
    dependencies:
      - target: 乘风AI

schemes:
  乘风AI:
    build:
      targets:
        乘风AI: all
        乘风AITests: [test, run]
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - 乘风AITests
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
      customArchiveName: "乘风AI"
      revealArchiveInOrganizer: true

groups:
  - 乘风AI
  - Tests
