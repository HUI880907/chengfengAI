name: ChengFengAI
options:
  bundleIdPrefix: com.chengfeng
  deploymentTarget:
    iOS: "16.0"

targets:
  ChengFengAI:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: ChengFengAI
        excludes:
          - "*.md"
          - ".DS_Store"
          - "Info.plist"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.chengfeng.ai
      PRODUCT_NAME: ChengFengAI
      INFOPLIST_FILE: ChengFengAI/Info.plist
      GENERATE_INFOPLIST_FILE: NO
      SWIFT_VERSION: "5.9"
      IPHONEOS_DEPLOYMENT_TARGET: "16.0"
      TARGETED_DEVICE_FAMILY: "1,2"
      CODE_SIGNING_ALLOWED: NO
      CODE_SIGNING_REQUIRED: NO