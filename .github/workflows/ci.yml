name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: |
          brew install xcodegen

      - name: Generate Xcode project
        run: |
          xcodegen generate

      - name: Build app for device
        run: |
          xcodebuild build \
            -project ChengFengAI.xcodeproj \
            -scheme ChengFengAI \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/ChengFengAI.xcarchive \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE=""

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build/ChengFengAI.xcarchive/Products/Applications/ChengFengAI.app Payload/
          zip -r ChengFengAI.ipa Payload/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChengFengAI-iOS-IPA
          path: ChengFengAI.ipa