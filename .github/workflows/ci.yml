name: ChengFengAI - iOS IPA Auto Build

on:
  push:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build-ipa:
    name: Build iOS IPA
    runs-on: macos-15
    steps:

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Environment info
        run: |
          echo "--- macOS ---"
          sw_vers
          echo ""
          echo "--- Xcode ---"
          xcodebuild -version
          echo ""
          echo "--- iOS SDK ---"
          xcrun --sdk iphoneos --show-sdk-version
          echo ""
          echo "--- XcodeGen ---"
          brew install xcodegen || true
          xcodegen --version 2>/dev/null || echo "(installed via brew)"
          echo ""
          echo "--- Current dir ---"
          pwd
          echo ""
          echo "--- Project structure ---"
          ls -la
          echo ""
          echo "--- 乘风AI sources ---"
          find "乘风AI" -name "*.swift" | head -20
          echo ""
          echo "Total Swift files: $(find "乘风AI" -name "*.swift" | wc -l | tr -d ' ')"

      - name: Generate Xcode project with XcodeGen
        run: |
          echo "=== Generating Xcode project ==="
          xcodegen generate --spec project.yml
          echo ""
          echo "=== Project files ==="
          ls -la *.xcodeproj 2>/dev/null || echo "(no xcodeproj found)"
          echo ""
          echo "=== Project targets ==="
          xcodebuild -list -project "乘风AI.xcodeproj" 2>/dev/null || echo "(xcodebuild list failed)"

      - name: Archive iOS app
        run: |
          echo "=== Archiving iOS app ==="
          xcodebuild \
            -project "乘风AI.xcodeproj" \
            -scheme "乘风AI" \
            -sdk iphoneos \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$PWD/build/ChengFengAI.xcarchive" \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE="" \
            2>&1 | tail -100
          echo ""
          echo "=== Archive structure ==="
          ls -la build/ 2>/dev/null || echo "(no build directory)"

      - name: Build IPA from archive
        run: |
          echo "=== Archive contents ==="
          APP_DIR="build/ChengFengAI.xcarchive/Products/Applications"
          ls -la "$APP_DIR/" 2>/dev/null
          APP_PATH=$(ls -d "$APP_DIR"/*.app 2>/dev/null | head -1)
          echo "App path: $APP_PATH"

          echo ""
          echo "=== Creating IPA (Payload structure) ==="
          mkdir -p build/IPA/Payload
          cp -R "$APP_PATH" build/IPA/Payload/

          echo ""
          echo "=== Creating IPA zip ==="
          cd build/IPA
          zip -r "ChengFengAI.ipa" Payload
          ls -lh
          cd ../..

          echo ""
          echo "=== Final IPA ==="
          ls -lh build/IPA/ChengFengAI.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChengFengAI-iOS-IPA
          path: build/IPA/ChengFengAI.ipa
          if-no-files-found: error
