name: ChengFengAI - iOS IPA Auto Build

on:
  push:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build-ipa:
    name: Build iOS IPA
    runs-on: macos-15
    steps:

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Environment info
        run: |
          echo "--- macOS ---"
          sw_vers
          echo ""
          echo "--- Xcode ---"
          xcodebuild -version
          echo ""
          echo "--- iPhoneOS SDK ---"
          xcrun --sdk iphoneos --show-sdk-path
          echo ""
          echo "--- swiftc ---"
          swiftc --version | head -2
          echo ""
          echo "--- Current dir ---"
          pwd
          echo ""
          echo "--- Top-level items ---"
          ls -la

      - name: Copy Swift sources to plain dir
        run: |
          mkdir -p src
          echo "Searching for .swift files..."
          COUNT=0
          while IFS= read -r -d '' file; do
            cp "$file" src/
            COUNT=$((COUNT + 1))
          done < <(find . -path "./.git" -prune -o -name "*.swift" -not -path "*/Tests/*" -not -path "*/Tests*" -print0)
          echo "Copied $COUNT .swift files to src/"
          echo ""
          echo "--- src/ contents ---"
          ls -la src/ | head -40
          echo ""
          echo "Total in src:"
          ls src/ | wc -l

      - name: Compile iOS arm64 binary with swiftc
        run: |
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "SDK: $SDK_PATH"
          echo ""
          echo "Compiling $(ls src/*.swift | wc -l | tr -d ' ') files for arm64-apple-ios16.0..."
          echo ""

          xcrun --sdk iphoneos swiftc \
            -target arm64-apple-ios16.0 \
            -sdk "$SDK_PATH" \
            -framework SwiftUI \
            -framework Foundation \
            -framework UIKit \
            -framework Combine \
            -framework AVFoundation \
            -framework UniformTypeIdentifiers \
            -framework Network \
            -framework CoreGraphics \
            -o chengfengai \
            src/*.swift 2>&1 | tail -250

          RC=${PIPESTATUS[0]}
          echo ""
          if [ $RC -ne 0 ]; then
            echo "FAILED: swiftc exit code $RC"
            exit $RC
          fi
          echo "SUCCESS: Compilation done"
          echo ""
          echo "Binary:"
          ls -lh chengfengai
          echo ""
          echo "Binary type:"
          file chengfengai

      - name: Build .app bundle
        run: |
          mkdir -p "Payload/ChengFengAI.app"
          cp chengfengai "Payload/ChengFengAI.app/ChengFengAI"
          chmod +x "Payload/ChengFengAI.app/ChengFengAI"
          echo "Copied executable"

          cat > "Payload/ChengFengAI.app/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleExecutable</key>
            <string>ChengFengAI</string>
            <key>CFBundleIdentifier</key>
            <string>com.chengfeng.ai</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>ChengFengAI</string>
            <key>CFBundleDisplayName</key>
            <string>ChengFengAI</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>MinimumOSVersion</key>
            <string>16.0</string>
            <key>UIApplicationSupportsIndirectInputEvents</key>
            <true/>
            <key>UILaunchScreen</key>
            <dict/>
            <key>UIRequiredDeviceCapabilities</key>
            <array>
              <string>arm64</string>
            </array>
            <key>UISupportedInterfaceOrientations</key>
            <array>
              <string>UIInterfaceOrientationPortrait</string>
              <string>UIInterfaceOrientationLandscapeLeft</string>
              <string>UIInterfaceOrientationLandscapeRight</string>
            </array>
            <key>UISupportedInterfaceOrientations~ipad</key>
            <array>
              <string>UIInterfaceOrientationPortrait</string>
              <string>UIInterfaceOrientationPortraitUpsideDown</string>
              <string>UIInterfaceOrientationLandscapeLeft</string>
              <string>UIInterfaceOrientationLandscapeRight</string>
            </array>
          </dict>
          </plist>
          PLIST
          echo "Created Info.plist"
          echo ""
          echo "--- .app contents ---"
          ls -lh "Payload/ChengFengAI.app/"

      - name: Package IPA
        run: |
          mkdir -p output
          zip -qr "output/ChengFengAI.ipa" Payload

          echo "SUCCESS: IPA created"
          echo ""
          ls -lh output/
          echo ""
          echo "--- IPA structure ---"
          unzip -l "output/ChengFengAI.ipa" | head -15

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChengFengAI-iOS-IPA
          path: output/*.ipa
          if-no-files-found: error

  stats:
    name: Code statistics
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Stats
        run: |
          echo "Swift files: $(find . -name "*.swift" -not -path "./.git/*" | wc -l)"
          echo ""
          echo "Line count:"
          find . -name "*.swift" -not -path "./.git/*" -exec wc -l {} + 2>&1 | tail -1
