name: ChengFengAI - iOS IPA Build

on:
  push:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build-ipa:
    name: Build iOS IPA
    runs-on: macos-15
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Environment info
        run: |
          echo "=== macOS ==="
          sw_vers
          echo ""
          echo "=== Xcode ==="
          xcodebuild -version
          echo ""
          echo "=== Available simulators (first 20) ==="
          xcrun simctl list devices available 2>&1 | head -30
          echo ""
          echo "=== XcodeGen ==="
          brew list xcodegen 2>/dev/null || brew install xcodegen 2>&1 | tail -5
          xcodegen --version 2>/dev/null || echo "(installing)"

      - name: Generate Xcode project
        run: |
          echo "=== Running XcodeGen ==="
          xcodegen generate --spec project.yml 2>&1
          echo ""
          echo "=== Generated project contents ==="
          ls -la "ChengFengAI.xcodeproj" 2>/dev/null || echo "(no xcodeproj found)"
          echo ""
          echo "=== Project targets ==="
          xcodebuild -list -project "ChengFengAI.xcodeproj" 2>&1 | head -30

      - name: Build for iOS simulator (syntax check + validation)
        run: |
          echo "=== Building for simulator (syntax validation) ==="
          xcodebuild \
            -project "ChengFengAI.xcodeproj" \
            -scheme "ChengFengAI" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build \
            2>&1 | tail -80

      - name: Build for iOS device (arm64)
        run: |
          echo "=== Building iOS app (arm64) ==="
          xcodebuild \
            -project "ChengFengAI.xcodeproj" \
            -scheme "ChengFengAI" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$PWD/build/dd" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS="arm64" \
            ENABLE_BITCODE=NO \
            build \
            2>&1 | tail -120
          echo ""
          echo "=== Build output structure ==="
          find build/dd -name "*.app" -type d 2>/dev/null || echo "(no .app found)"

      - name: Locate .app and package IPA
        run: |
          echo "=== Looking for .app ==="
          APP_PATH=$(find build/dd -name "*.app" -type d 2>/dev/null | grep -v ".dSYM" | head -1)
          echo "Found: $APP_PATH"
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found"
            echo ""
            echo "=== Searching anywhere ==="
            find . -name "*.app" -type d 2>/dev/null | head -10
            echo ""
            echo "=== Build dir contents ==="
            ls -la build/ 2>/dev/null || echo "(no build dir)"
            exit 1
          fi
          echo ""
          echo "=== Creating IPA ==="
          mkdir -p build/IPA/Payload
          cp -R "$APP_PATH" build/IPA/Payload/
          cd build/IPA
          zip -qr ChengFengAI.ipa Payload
          ls -lh
          cd ../..
          echo ""
          echo "=== Final IPA size ==="
          ls -lh build/IPA/ChengFengAI.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChengFengAI-iOS-IPA
          path: build/IPA/ChengFengAI.ipa
          if-no-files-found: error

      - name: Attest build provenance
        if: success()
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: build/IPA/ChengFengAI.ipa
