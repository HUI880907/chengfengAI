name: Test Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    name: Test Build
    runs-on: macos-15
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: List files
        run: |
          ls -la
          ls -la ChengFengAI/

      - name: Try xcodebuild
        run: |
          xcodebuild -version
          xcodebuild -showsdks
          
          mkdir -p testproj
          cd testproj
          
          cat > package.swift << 'EOF'
// swift-tools-version:5.9
import PackageDescription

let package = Package(
    name: "TestApp",
    platforms: [.iOS(.v16)],
    products: [
        .executable(name: "TestApp", targets: ["TestApp"])
    ],
    targets: [
        .target(name: "TestApp")
    ]
)
EOF

          mkdir -p Sources/TestApp
          cat > Sources/TestApp/main.swift << 'EOF'
import SwiftUI

@main
struct TestApp: App {
    var body: some Scene {
        WindowGroup {
            Text("Hello")
        }
    }
}
EOF

          swift build --configuration release 2>&1 || true
          
          cd ..
          ls -la testproj/.build/release/ 2>&1 || true