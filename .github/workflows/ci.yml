name: ChengFengAI - iOS IPA Build

on:
  push:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build-ipa:
    name: Build iOS IPA
    runs-on: macos-15
    permissions:
      id-token: write
      attestations: write
      contents: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          echo "=== Checking xcodegen ==="
          xcodegen --version 2>&1 || (brew install xcodegen 2>&1 | tail -5)
          echo "=== Checking codesign ==="
          codesign --help 2>&1 | head -3 || true
          echo "=== Checking ldid ==="
          ldid 2>&1 | head -3 || (brew install ldid 2>&1 | tail -5)

      - name: Generate Xcode project
        run: |
          xcodegen generate --spec project.yml 2>&1
          ls -la "ChengFengAI.xcodeproj" 2>/dev/null || echo "(no project file!)"

      - name: Build for iOS simulator (syntax validation)
        run: |
          xcodebuild \
            -project "ChengFengAI.xcodeproj" \
            -scheme "ChengFengAI" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build \
            2>&1 | tail -30

      - name: Build for iOS device (arm64, no signing at build time)
        run: |
          xcodebuild \
            -project "ChengFengAI.xcodeproj" \
            -scheme "ChengFengAI" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$PWD/build/dd" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS="arm64" \
            ENABLE_BITCODE=NO \
            build \
            2>&1 | tail -40

          APP_PATH=$(find build/dd -name "*.app" -type d 2>/dev/null | grep -v "\.dSYM" | head -1)
          echo "APP_PATH=${APP_PATH}" >> $GITHUB_ENV
          echo "Found: ${APP_PATH}"

      - name: Verify .app structure and Info.plist
        run: |
          APP_PATH="${{ env.APP_PATH }}"
          echo "=== .app contents ==="
          ls -la "${APP_PATH}/"
          echo ""
          echo "=== Info.plist ==="
          plutil -p "${APP_PATH}/Info.plist" 2>&1
          echo ""
          echo "=== Binary check ==="
          EXEC_NAME=$(plutil -extract CFBundleExecutable raw -o - "${APP_PATH}/Info.plist" 2>/dev/null || echo "ChengFengAI")
          echo "Executable name from plist: ${EXEC_NAME}"
          if [ -f "${APP_PATH}/${EXEC_NAME}" ]; then
            file "${APP_PATH}/${EXEC_NAME}"
          else
            echo "WARNING: executable '${EXEC_NAME}' NOT found at ${APP_PATH}/${EXEC_NAME}!"
          fi

      - name: Ad-hoc sign with codesign
        run: |
          APP_PATH="${{ env.APP_PATH }}"
          echo "=== codesign --force --deep --sign - ==="
          codesign --force --deep --sign - "${APP_PATH}" 2>&1
          echo "Exit: $?"
          echo ""
          echo "=== Verify signature ==="
          codesign -dv "${APP_PATH}" 2>&1 || echo "(verify skipped)"
          echo ""
          echo "=== _CodeSignature after signing ==="
          ls -la "${APP_PATH}/_CodeSignature/" 2>/dev/null || echo "(no _CodeSignature dir)"

      - name: Fallback sign with ldid (if codesign left no signature)
        run: |
          APP_PATH="${{ env.APP_PATH }}"
          if [ -d "${APP_PATH}/_CodeSignature" ]; then
            echo "_CodeSignature exists, skipping ldid fallback"
          else
            echo "=== ldid -S fallback ==="
            EXEC_NAME=$(plutil -extract CFBundleExecutable raw -o - "${APP_PATH}/Info.plist" 2>/dev/null || echo "ChengFengAI")
            if [ -f "${APP_PATH}/${EXEC_NAME}" ]; then
              ldid -S "${APP_PATH}/${EXEC_NAME}" 2>&1
              echo "ldid result: $?"
            fi
          fi

      - name: Ensure PkgInfo and minimal signature
        run: |
          APP_PATH="${{ env.APP_PATH }}"
          printf 'APPL????' > "${APP_PATH}/PkgInfo"
          echo "PkgInfo created"
          ls -la "${APP_PATH}/PkgInfo"
          echo ""
          echo "=== Final .app contents ==="
          ls -la "${APP_PATH}/"

      - name: Package as IPA
        run: |
          APP_PATH="${{ env.APP_PATH }}"
          rm -rf build/IPA
          mkdir -p build/IPA/Payload
          cp -R "${APP_PATH}" build/IPA/Payload/
          cd build/IPA
          zip -qr ChengFengAI.ipa Payload
          cd ../..
          echo "=== IPA ==="
          ls -lh build/IPA/ChengFengAI.ipa
          echo ""
          echo "=== IPA contents listing ==="
          unzip -l build/IPA/ChengFengAI.ipa | head -30

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChengFengAI-iOS-IPA
          path: build/IPA/ChengFengAI.ipa
          if-no-files-found: error

      - name: Attest build provenance
        if: success()
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: build/IPA/ChengFengAI.ipa

      - name: Publish to GitHub Releases
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-ipa
          name: 乘风AI - iOS IPA (最新构建)
          files: build/IPA/ChengFengAI.ipa
          make_latest: true
          body: |
            # 乘风AI iOS 应用

            **Bundle ID:** com.chengfeng.ai
            **显示名称:** 乘风AI
            **架构:** arm64 (iPhone)
            **签名:** Ad-hoc (codesign -s - --deep --force)

            安装方法:
            1. 下载下方 ChengFengAI.ipa
            2. 使用 LiveContainer / SideStore / 巨魔商店 安装到 iPhone

            构建信息: ${{ github.sha }} · ${{ github.event.head_commit.message }}
