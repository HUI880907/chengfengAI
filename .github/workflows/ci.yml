name: ChengFengAI - iOS IPA Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build for iOS Device
        run: |
          xcodebuild build \
            -project ChengFengAI.xcodeproj \
            -scheme ChengFengAI \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE=""

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -R build/Release-iphoneos/ChengFengAI.app Payload/
          cd Payload && zip -r ../ChengFengAI.ipa ChengFengAI.app

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ChengFengAI-iOS-IPA
          path: ChengFengAI.ipa