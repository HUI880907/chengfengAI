name: 乘风AI - IPA 自动打包 (swiftc 直编)

on:
  push:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build-ipa:
    name: 生成可侧装 iOS IPA
    runs-on: macos-15
    steps:

      # --- 1. 检出代码 ---
      - name: 📥 检出代码
        uses: actions/checkout@v4

      # --- 2. 系统/SDK 检查 ---
      - name: 🔍 检查系统和 iOS SDK
        run: |
          echo "=== macOS 版本 ==="
          sw_vers
          echo ""
          echo "=== Xcode 版本 ==="
          xcodebuild -version
          echo ""
          echo "=== 可用 SDK ==="
          xcodebuild -showsdks 2>&1 | grep -i ios
          echo ""
          echo "=== iPhoneOS SDK 路径 ==="
          xcrun --sdk iphoneos --show-sdk-path
          echo ""
          echo "=== swiftc 版本 ==="
          swiftc --version | head -3

      # --- 3. 检查源码 ---
      - name: 📂 检查项目源码
        run: |
          echo "=== 工作目录 ==="
          pwd
          echo ""
          echo "=== 目录结构（前 30 行） ==="
          find . -not -path "./.git/*" -not -name ".*" | sort | head -40
          echo ""
          echo "=== Swift 源文件 ==="
          find . -name "*.swift" -not -path "./.git/*" | sort
          echo ""
          echo "=== Swift 文件总数 ==="
          find . -name "*.swift" -not -path "./.git/*" | wc -l

      # --- 4. 交叉编译 arm64 真机二进制 ---
      - name: ⚙️ 交叉编译 iOS arm64 可执行文件
        run: |
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "✓ SDK 路径: $SDK_PATH"

          # 收集所有 Swift 源文件
          SWIFT_SOURCES=$(find "乘风AI" -name "*.swift" -type f | sort | tr '\n' ' ')
          SOURCE_COUNT=$(find "乘风AI" -name "*.swift" -type f | wc -l | tr -d ' ')
          echo "✓ 找到 Swift 源文件: $SOURCE_COUNT 个"

          if [ "$SOURCE_COUNT" -eq 0 ]; then
            echo "✗ 没有找到 Swift 源文件！"
            exit 1
          fi

          # 用 swiftc 交叉编译 arm64-apple-ios
          echo "→ 开始编译 (可能需要 1-3 分钟)..."
          xcrun --sdk iphoneos swiftc \
            -target arm64-apple-ios16.0 \
            -sdk "$SDK_PATH" \
            -I "$SDK_PATH/usr/lib/swift" \
            -F "$SDK_PATH/System/Library/Frameworks" \
            -framework SwiftUI \
            -framework Foundation \
            -framework UIKit \
            -framework Combine \
            -framework CoreGraphics \
            -framework Speech \
            -o chengfengai \
            $SWIFT_SOURCES 2>&1 | tail -100

          BUILD_EXIT=${PIPESTATUS[0]}

          echo ""
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "✗ 编译失败 (退出码: $BUILD_EXIT)"
            exit $BUILD_EXIT
          fi

          # 验证输出文件
          echo "✓ 编译成功"
          echo "  文件:"
          ls -lh chengfengai
          echo "  类型:"
          file chengfengai

      # --- 5. 组装 .app 应用包 ---
      - name: 📦 组装 iOS 应用包 (.app)
        run: |
          APP_DIR="Payload/chengfengai.app"
          mkdir -p "$APP_DIR"

          # 复制可执行文件
          cp chengfengai "$APP_DIR/chengfengai"
          chmod +x "$APP_DIR/chengfengai"
          echo "✓ 已复制可执行文件"

          # 创建 Info.plist
          cat > "$APP_DIR/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>zh_CN</string>
            <key>CFBundleExecutable</key>
            <string>chengfengai</string>
            <key>CFBundleIdentifier</key>
            <string>com.chengfeng.ai</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>乘风AI</string>
            <key>CFBundleDisplayName</key>
            <string>乘风AI</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>MinimumOSVersion</key>
            <string>16.0</string>
            <key>UIApplicationSupportsIndirectInputEvents</key>
            <true/>
            <key>UILaunchScreen</key>
            <dict/>
            <key>UIRequiredDeviceCapabilities</key>
            <array>
              <string>arm64</string>
            </array>
            <key>UISupportedInterfaceOrientations</key>
            <array>
              <string>UIInterfaceOrientationPortrait</string>
              <string>UIInterfaceOrientationLandscapeLeft</string>
              <string>UIInterfaceOrientationLandscapeRight</string>
            </array>
            <key>UISupportedInterfaceOrientations~ipad</key>
            <array>
              <string>UIInterfaceOrientationPortrait</string>
              <string>UIInterfaceOrientationPortraitUpsideDown</string>
              <string>UIInterfaceOrientationLandscapeLeft</string>
              <string>UIInterfaceOrientationLandscapeRight</string>
            </array>
          </dict>
          </plist>
          PLIST
          echo "✓ 已创建 Info.plist"

          # 验证 .app 内容
          echo ""
          echo "=== .app 内容 ==="
          ls -lh "$APP_DIR/"

      # --- 6. 打包为 IPA ---
      - name: 📲 压缩打包为 IPA
        run: |
          mkdir -p output
          cd Payload/.. && zip -qr "output/chengfengai.ipa" Payload
          
          SIZE=$(du -h "output/chengfengai.ipa" | cut -f1)
          echo "✓ IPA 生成成功"
          echo "  文件: output/chengfengai.ipa"
          echo "  大小: $SIZE"
          echo ""
          echo "=== IPA 结构 ==="
          unzip -l "output/chengfengai.ipa" | head -20

      # --- 7. 上传 IPA ---
      - name: 📤 上传 IPA (可侧装到 iPhone)
        uses: actions/upload-artifact@v4
        with:
          name: ChengFengAI-iOS-IPA
          path: output/*.ipa
          if-no-files-found: error

  # 代码统计（独立 job，不影响 IPA 生成）
  stats:
    name: 代码统计
    runs-on: ubuntu-latest
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
      - name: 📊 统计
        run: |
          echo "=== 乘风AI 项目统计 ==="
          echo ""
          echo "Swift 文件: $(find . -name "*.swift" -not -path "./.git/*" | wc -l) 个"
          echo ""
          echo "Swift 代码行数:"
          find . -name "*.swift" -not -path "./.git/*" -exec wc -l {} + 2>&1 | tail -1
          echo ""
          echo "=== 文件结构 ==="
          find . -maxdepth 3 -type f -not -path "./.git/*" | sort | head -30
