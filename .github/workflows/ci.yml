name: ChengFengAI - iOS IPA Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ipa:
    name: Build iOS IPA
    runs-on: macos-15
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: List files
        run: |
          ls -la
          ls -la ChengFengAI/

      - name: Compile with swiftc
        run: |
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "SDK: $SDK_PATH"
          
          SWIFT_FILE="ChengFengAI/ChengFengAIApp.swift"
          echo "Compiling: $SWIFT_FILE"
          
          swiftc \
            -target arm64-apple-ios16.0 \
            -sdk "$SDK_PATH" \
            -framework Foundation \
            -framework UIKit \
            -framework SwiftUI \
            -o ChengFengAI \
            "$SWIFT_FILE"

      - name: Check binary
        run: |
          ls -lh ChengFengAI
          file ChengFengAI

      - name: Create minimal .app
        run: |
          mkdir -p ChengFengAI.app
          cp ChengFengAI ChengFengAI.app/ChengFengAI
          cp ChengFengAI/Info.plist ChengFengAI.app/Info.plist
          printf 'APPL????' > ChengFengAI.app/PkgInfo
          mkdir -p ChengFengAI.app/_CodeSignature
          echo '<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0"><dict></dict></plist>' > ChengFengAI.app/_CodeSignature/CodeResources
          codesign --force --deep --sign - ChengFengAI.app 2>&1 || true

      - name: Package IPA
        run: |
          mkdir -p IPA/Payload
          cp -R ChengFengAI.app IPA/Payload/
          cd IPA
          zip -r ChengFengAI.ipa Payload
          ls -lh ChengFengAI.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ChengFengAI-iOS-IPA
          path: IPA/ChengFengAI.ipa
          if-no-files-found: error