name: Test Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    name: Test Build
    runs-on: macos-15
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Test environment
        run: |
          echo "=== Testing environment ==="
          sw_vers
          swift --version
          xcrun --sdk iphoneos --show-sdk-path
          ls -la
          echo ""
          echo "=== ChengFengAI directory ==="
          ls -la ChengFengAI/
          echo ""
          echo "=== Swift files ==="
          find ChengFengAI -name "*.swift" -type f

      - name: Try to compile
        run: |
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          SWIFT_FILE="ChengFengAI/ChengFengAIApp.swift"
          
          if [ -f "$SWIFT_FILE" ]; then
            echo "File exists: $SWIFT_FILE"
            head -20 "$SWIFT_FILE"
            
            swiftc \
              -target arm64-apple-ios16.0 \
              -sdk "$SDK_PATH" \
              -framework Foundation \
              -framework UIKit \
              -framework SwiftUI \
              -o testapp \
              "$SWIFT_FILE" 2>&1
              
            if [ -f "testapp" ]; then
              echo "=== Compilation successful ==="
              ls -lh testapp
              file testapp
            else
              echo "=== Compilation failed ==="
              exit 1
            fi
          else
            echo "File not found: $SWIFT_FILE"
            exit 1
          fi