name: ChengFengAI - iOS IPA Build

on:
  push:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build-ipa:
    name: Build iOS IPA
    runs-on: macos-15
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Environment info
        run: |
          echo "--- macOS ---"
          sw_vers
          echo ""
          echo "--- Xcode ---"
          xcodebuild -version
          echo ""
          echo "--- XcodeGen ---"
          brew install xcodegen 2>/dev/null || true
          xcodegen --version 2>/dev/null || echo "(installed)"

      - name: Generate Xcode project
        run: |
          echo "=== Running XcodeGen ==="
          xcodegen generate --spec project.yml
          echo ""
          echo "=== Project files ==="
          ls -la *.xcodeproj/ 2>/dev/null || echo "(WARNING: no xcodeproj generated)"

      - name: Build iOS app (Release, simulator-free)
        run: |
          echo "=== Building for iOS devices (arm64) ==="
          xcodebuild \
            -project "乘风AI.xcodeproj" \
            -scheme "乘风AI" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS="arm64" \
            ENABLE_BITCODE=NO \
            STRIP_INSTALLED_PRODUCT=YES \
            build \
            2>&1 | tail -200
          BUILD_RESULT=${PIPESTATUS[0]}
          echo ""
          echo "Build exit code: $BUILD_RESULT"
          exit $BUILD_RESULT

      - name: Locate .app and package IPA
        run: |
          echo "=== Looking for .app ==="
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "乘风AI.app" -type d 2>/dev/null | head -1)
          echo "Found: $APP_PATH"
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find /Users/runner/Library/Developer/Xcode/DerivedData -name "ChengFengAI*.app" -type d 2>/dev/null | head -1)
            echo "Alt found: $APP_PATH"
          fi
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found"
            echo ""
            echo "=== Try to find any .app ==="
            find . -name "*.app" -type d 2>/dev/null | head -5
            echo ""
            echo "=== DerivedData contents ==="
            ls -la ~/Library/Developer/Xcode/DerivedData/ 2>/dev/null || true
            exit 1
          fi
          echo ""
          echo "=== Creating IPA ==="
          mkdir -p build/IPA/Payload
          cp -R "$APP_PATH" build/IPA/Payload/
          cd build/IPA
          zip -qr ChengFengAI.ipa Payload
          ls -lh
          cd ../..
          echo ""
          echo "=== Final IPA size ==="
          ls -lh build/IPA/ChengFengAI.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChengFengAI-iOS-IPA
          path: build/IPA/ChengFengAI.ipa
          if-no-files-found: error

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: build/IPA/ChengFengAI.ipa
