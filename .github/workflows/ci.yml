name: 乘风AI - IPA 自动打包 (swiftc 直编)

on:
  push:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build-ipa:
    name: 生成可侧装 iOS IPA
    runs-on: macos-15
    steps:

      # --- 1. 检出代码 ---
      - name: Checkout source
        uses: actions/checkout@v4

      # --- 2. 系统/SDK 检查 ---
      - name: Check system and SDK
        run: |
          export LC_ALL=C.UTF-8
          echo "=== macOS ==="
          sw_vers
          echo ""
          echo "=== Xcode ==="
          xcodebuild -version
          echo ""
          echo "=== iPhoneOS SDK ==="
          xcrun --sdk iphoneos --show-sdk-path
          echo ""
          echo "=== swiftc ==="
          swiftc --version | head -2

      # --- 3. 检查源码 ---
      - name: Find and list source files
        run: |
          export LC_ALL=C.UTF-8
          echo "=== Current dir ==="
          pwd
          echo ""
          echo "=== Top-level dirs ==="
          ls -d */ 2>/dev/null || ls -la
          echo ""
          echo "=== All Swift files ==="
          find . -name "*.swift" -not -path "./.git/*" | sort
          echo ""
          echo "=== Count ==="
          find . -name "*.swift" -not -path "./.git/*" | wc -l

      # --- 4. 交叉编译 arm64 真机二进制 ---
      - name: Compile iOS arm64 binary
        run: |
          export LC_ALL=C.UTF-8
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "SDK: $SDK_PATH"

          # 自动收集所有 Swift 源文件（按路径排序保证编译顺序稳定）
          SWIFT_FILES=$(find . -name "*.swift" -not -path "./.git/*" -not -path "./Tests/*" | sort | tr '\n' ' ')
          FILE_COUNT=$(find . -name "*.swift" -not -path "./.git/*" -not -path "./Tests/*" | wc -l | tr -d ' ')
          echo "Source files: $FILE_COUNT"

          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "ERROR: No Swift source files found"
            exit 1
          fi

          echo "Compiling with swiftc for arm64-apple-ios16.0..."
          echo "This may take 1-3 minutes..."
          echo ""

          xcrun --sdk iphoneos swiftc \
            -target arm64-apple-ios16.0 \
            -sdk "$SDK_PATH" \
            -framework SwiftUI \
            -framework Foundation \
            -framework UIKit \
            -framework Combine \
            -framework AVFoundation \
            -framework UniformTypeIdentifiers \
            -framework Network \
            -framework CoreGraphics \
            -o chengfengai \
            $SWIFT_FILES 2>&1 | tail -200

          BUILD_EXIT=${PIPESTATUS[0]}

          echo ""
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "FAILED: swiftc exit code $BUILD_EXIT"
            exit $BUILD_EXIT
          fi

          echo "SUCCESS: Compilation done"
          echo "File:"
          ls -lh chengfengai
          echo "Type:"
          file chengfengai

      # --- 5. 组装 .app 应用包 ---
      - name: Build .app bundle
        run: |
          APP_DIR="Payload/chengfengai.app"
          mkdir -p "$APP_DIR"

          cp chengfengai "$APP_DIR/chengfengai"
          chmod +x "$APP_DIR/chengfengai"
          echo "Copied executable"

          cat > "$APP_DIR/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleExecutable</key>
            <string>chengfengai</string>
            <key>CFBundleIdentifier</key>
            <string>com.chengfeng.ai</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>ChengFengAI</string>
            <key>CFBundleDisplayName</key>
            <string>ChengFengAI</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>MinimumOSVersion</key>
            <string>16.0</string>
            <key>UIApplicationSupportsIndirectInputEvents</key>
            <true/>
            <key>UILaunchScreen</key>
            <dict/>
            <key>UIRequiredDeviceCapabilities</key>
            <array>
              <string>arm64</string>
            </array>
            <key>UISupportedInterfaceOrientations</key>
            <array>
              <string>UIInterfaceOrientationPortrait</string>
              <string>UIInterfaceOrientationLandscapeLeft</string>
              <string>UIInterfaceOrientationLandscapeRight</string>
            </array>
            <key>UISupportedInterfaceOrientations~ipad</key>
            <array>
              <string>UIInterfaceOrientationPortrait</string>
              <string>UIInterfaceOrientationPortraitUpsideDown</string>
              <string>UIInterfaceOrientationLandscapeLeft</string>
              <string>UIInterfaceOrientationLandscapeRight</string>
            </array>
          </dict>
          </plist>
          PLIST
          echo "Created Info.plist"

          echo ""
          echo "=== .app contents ==="
          ls -lh "$APP_DIR/"

      # --- 6. 打包为 IPA ---
      - name: Package IPA
        run: |
          mkdir -p output
          zip -qr "output/chengfengai.ipa" Payload

          echo "SUCCESS: IPA created"
          echo ""
          ls -lh output/
          echo ""
          echo "=== IPA structure ==="
          unzip -l "output/chengfengai.ipa" | head -15

      # --- 7. 上传 IPA ---
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChengFengAI-iOS-IPA
          path: output/*.ipa
          if-no-files-found: error

  stats:
    name: Code statistics
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Stats
        run: |
          echo "=== Statistics ==="
          echo "Swift files: $(find . -name "*.swift" -not -path "./.git/*" | wc -l)"
          echo ""
          echo "Line count:"
          find . -name "*.swift" -not -path "./.git/*" -exec wc -l {} + 2>&1 | tail -1
