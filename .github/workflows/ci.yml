name: ChengFengAI - iOS IPA Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ipa:
    name: Build iOS IPA
    runs-on: macos-15
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Generate Xcode project
        run: |
          brew install xcodegen
          xcodegen generate

      - name: Build iOS app
        run: |
          xcodebuild \
            -project ChengFengAI.xcodeproj \
            -scheme ChengFengAI \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            -archivePath build/ChengFengAI.xcarchive \
            archive

      - name: Package as IPA
        run: |
          APP_PATH=$(find build/ChengFengAI.xcarchive -name "*.app" -type d | head -1)
          mkdir -p build/IPA/Payload
          cp -R "$APP_PATH" build/IPA/Payload/
          cd build/IPA
          zip -r ChengFengAI.ipa Payload
          ls -lh ChengFengAI.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ChengFengAI-iOS-IPA
          path: build/IPA/ChengFengAI.ipa
          if-no-files-found: error