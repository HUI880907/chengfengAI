name: ChengFengAI - iOS IPA Build

on:
  push:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build-ipa:
    name: Build iOS IPA
    runs-on: macos-15
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Environment info
        run: |
          echo "=== macOS ==="
          sw_vers
          echo ""
          echo "=== Xcode ==="
          xcodebuild -version
          echo ""
          echo "=== XcodeGen ==="
          brew list xcodegen 2>/dev/null || brew install xcodegen 2>&1 | tail -5
          xcodegen --version 2>/dev/null || echo "(installing)"
          echo ""
          echo "=== codesign tool ==="
          which codesign
          codesign --version 2>&1 || true

      - name: Generate Xcode project
        run: |
          echo "=== Running XcodeGen ==="
          xcodegen generate --spec project.yml 2>&1
          echo ""
          echo "=== Generated project contents ==="
          ls -la "ChengFengAI.xcodeproj" 2>/dev/null || echo "(no xcodeproj found)"
          echo ""
          echo "=== Project targets ==="
          xcodebuild -list -project "ChengFengAI.xcodeproj" 2>&1 | head -30

      - name: Build for iOS simulator (syntax check)
        run: |
          echo "=== Building for simulator (syntax validation) ==="
          xcodebuild \
            -project "ChengFengAI.xcodeproj" \
            -scheme "ChengFengAI" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build \
            2>&1 | tail -50

      - name: Build for iOS device (arm64) + ad-hoc sign
        run: |
          echo "=== Building iOS app (arm64) with ad-hoc signing ==="
          xcodebuild \
            -project "ChengFengAI.xcodeproj" \
            -scheme "ChengFengAI" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$PWD/build/dd" \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS="arm64" \
            ENABLE_BITCODE=NO \
            build \
            2>&1 | tail -120

          echo ""
          echo "=== Locate .app ==="
          APP_PATH=$(find build/dd -name "*.app" -type d 2>/dev/null | grep -v ".dSYM" | head -1)
          echo "Found: $APP_PATH"
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found"
            find build/dd -type d 2>/dev/null | head -30
            exit 1
          fi

          echo ""
          echo "=== .app contents ==="
          ls -la "$APP_PATH/"

          echo ""
          echo "=== .app binary (executable) ==="
          EXEC_NAME=$(plutil -extract CFBundleExecutable raw -o - "$APP_PATH/Info.plist" 2>/dev/null || echo "ChengFengAI")
          echo "Executable name: $EXEC_NAME"
          if [ -f "$APP_PATH/$EXEC_NAME" ]; then
            file "$APP_PATH/$EXEC_NAME"
          else
            echo "WARNING: Executable $EXEC_NAME not found!"
            ls "$APP_PATH/"
          fi

          echo ""
          echo "=== Info.plist dump ==="
          plutil -p "$APP_PATH/Info.plist" 2>&1 | head -30

          echo ""
          echo "=== Force re-sign with ad-hoc identity (deep) ==="
          codesign --force --deep --sign - "$APP_PATH" 2>&1
          echo "Signing result: $?"

          echo ""
          echo "=== Verify signature ==="
          codesign -dv "$APP_PATH" 2>&1 || true

          echo ""
          echo "=== Check _CodeSignature ==="
          ls -la "$APP_PATH/_CodeSignature/" 2>/dev/null || echo "(no _CodeSignature - creating placeholder)"
          if [ ! -d "$APP_PATH/_CodeSignature" ]; then
            mkdir -p "$APP_PATH/_CodeSignature"
            echo "<?xml version=\"1.0\" encoding=\"UTF-8\"?>" > "$APP_PATH/_CodeSignature/CodeResources"
            echo "<!DOCTYPE plist PUBLIC \"-//Apple//DTD PLIST 1.0//EN\" \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\">" >> "$APP_PATH/_CodeSignature/CodeResources"
            echo "<plist version=\"1.0\"><dict></dict></plist>" >> "$APP_PATH/_CodeSignature/CodeResources"
          fi

          echo ""
          echo "=== Create PkgInfo ==="
          printf 'APPL????' > "$APP_PATH/PkgInfo"

          echo ""
          echo "=== Final .app structure summary ==="
          echo "--- top level ---"
          ls "$APP_PATH/"
          echo ""
          echo "--- file sizes ---"
          du -h "$APP_PATH"/* 2>/dev/null | head -20

          echo ""
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV

      - name: Package IPA
        run: |
          echo "=== Creating IPA ==="
          APP_PATH="${{ env.APP_PATH }}"
          echo "Using .app at: $APP_PATH"
          rm -rf build/IPA
          mkdir -p build/IPA/Payload
          cp -R "$APP_PATH" build/IPA/Payload/

          APP_NAME=$(basename "$APP_PATH")
          echo "Final .app name in Payload: $APP_NAME"
          ls "build/IPA/Payload/"

          cd build/IPA
          echo ""
          echo "=== Creating zip (IPA)... ==="
          zip -qr ChengFengAI.ipa Payload
          ls -lh
          cd ../..

          echo ""
          echo "=== IPA info ==="
          ls -lh build/IPA/ChengFengAI.ipa
          unzip -l build/IPA/ChengFengAI.ipa | head -20

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChengFengAI-iOS-IPA
          path: build/IPA/ChengFengAI.ipa
          if-no-files-found: error

      - name: Attest build provenance
        if: success()
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: build/IPA/ChengFengAI.ipa
