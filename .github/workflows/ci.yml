name: ChengFengAI - iOS IPA Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ipa:
    name: Build iOS IPA
    runs-on: macos-15
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Create temp project
        run: |
          mkdir -p temp/ChengFengAI
          cp ChengFengAI/ChengFengAIApp.swift temp/ChengFengAI/
          cp ChengFengAI/Info.plist temp/ChengFengAI/
          
          cat > temp/project.pbxproj << 'EOF'
// !$*UTF8*$!
{
	archiveVersion = 1;
	classes = {
	};
	objectVersion = 56;
	objects = {

/* Begin PBXBuildFile section */
		AA0000000000000000000001 /* ChengFengAIApp.swift in Sources */ = {isa = PBXBuildFile; fileRef = AA0000000000000000000002; };
/* End PBXBuildFile section */

/* Begin PBXFileReference section */
		000000000000000000000001 /* ChengFengAI.app */ = {isa = PBXFileReference; explicitFileType = wrapper.application; includeInIndex = 0; path = ChengFengAI.app; sourceTree = BUILT_PRODUCTS_DIR; };
		AA0000000000000000000002 /* ChengFengAIApp.swift */ = {isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = ChengFengAIApp.swift; sourceTree = "<group>"; };
		BB0000000000000000000001 /* Info.plist */ = {isa = PBXFileReference; lastKnownFileType = text.plist.xml; path = Info.plist; sourceTree = "<group>"; };
/* End PBXFileReference section */

/* Begin PBXGroup section */
		000000000000000000000002 = {
			isa = PBXGroup;
			children = (
				000000000000000000000003 /* ChengFengAI */,
				000000000000000000000004 /* Products */,
			);
			sourceTree = "<group>";
		};
		000000000000000000000003 /* ChengFengAI */ = {
			isa = PBXGroup;
			children = (
				AA0000000000000000000002 /* ChengFengAIApp.swift */,
				BB0000000000000000000001 /* Info.plist */,
			);
			path = ChengFengAI;
			sourceTree = "<group>";
		};
		000000000000000000000004 /* Products */ = {
			isa = PBXGroup;
			children = (
				000000000000000000000001 /* ChengFengAI.app */,
			);
			name = Products;
			sourceTree = "<group>";
		};
/* End PBXGroup section */

/* Begin PBXNativeTarget section */
		000000000000000000000005 /* ChengFengAI */ = {
			isa = PBXNativeTarget;
			buildConfigurationList = 000000000000000000000006;
			buildPhases = (
				000000000000000000000007 /* Sources */,
				000000000000000000000008 /* Resources */,
			);
			name = ChengFengAI;
			productName = ChengFengAI;
			productReference = 000000000000000000000001;
			productType = "com.apple.product-type.application";
		};
/* End PBXNativeTarget section */

/* Begin PBXProject section */
		000000000000000000000009 = {
			isa = PBXProject;
			attributes = {
				LastUpgradeCheck = 1500;
				OrganizationName = Test;
				TargetAttributes = {
					000000000000000000000005 = {
						CreatedOnToolsVersion = 15.0;
					};
				};
			};
			buildConfigurationList = 00000000000000000000000A;
			compatibilityVersion = "Xcode 15.0";
			developmentRegion = en;
			mainGroup = 000000000000000000000002;
			productRefGroup = 000000000000000000000004;
			targets = (
				000000000000000000000005,
			);
		};
/* End PBXProject section */

/* Begin PBXResourcesBuildPhase section */
		000000000000000000000008 /* Resources */ = {
			isa = PBXResourcesBuildPhase;
			files = ();
			runOnlyForDeploymentPostprocessing = 0;
		};
/* End PBXResourcesBuildPhase section */

/* Begin PBXSourcesBuildPhase section */
		000000000000000000000007 /* Sources */ = {
			isa = PBXSourcesBuildPhase;
			files = (
				AA0000000000000000000001,
			);
			runOnlyForDeploymentPostprocessing = 0;
		};
/* End PBXSourcesBuildPhase section */

/* Begin XCBuildConfiguration section */
		00000000000000000000000B /* Debug */ = {
			isa = XCBuildConfiguration;
			buildSettings = {
				CODE_SIGNING_ALLOWED = NO;
				INFOPLIST_FILE = ChengFengAI/Info.plist;
				IPHONEOS_DEPLOYMENT_TARGET = 16.0;
				PRODUCT_BUNDLE_IDENTIFIER = com.chengfeng.ai;
				PRODUCT_NAME = ChengFengAI;
			};
			name = Debug;
		};
		00000000000000000000000C /* Release */ = {
			isa = XCBuildConfiguration;
			buildSettings = {
				CODE_SIGNING_ALLOWED = NO;
				INFOPLIST_FILE = ChengFengAI/Info.plist;
				IPHONEOS_DEPLOYMENT_TARGET = 16.0;
				PRODUCT_BUNDLE_IDENTIFIER = com.chengfeng.ai;
				PRODUCT_NAME = ChengFengAI;
			};
			name = Release;
		};
		00000000000000000000000D /* Debug */ = {
			isa = XCBuildConfiguration;
			buildSettings = {
				IPHONEOS_DEPLOYMENT_TARGET = 16.0;
				SDKROOT = iphoneos;
			};
			name = Debug;
		};
		00000000000000000000000E /* Release */ = {
			isa = XCBuildConfiguration;
			buildSettings = {
				IPHONEOS_DEPLOYMENT_TARGET = 16.0;
				SDKROOT = iphoneos;
			};
			name = Release;
		};
/* End XCBuildConfiguration section */

/* Begin XCConfigurationList section */
		000000000000000000000006 = {
			isa = XCConfigurationList;
			buildConfigurations = (
				00000000000000000000000B,
				00000000000000000000000C,
			);
			defaultConfigurationName = Release;
		};
		00000000000000000000000A = {
			isa = XCConfigurationList;
			buildConfigurations = (
				00000000000000000000000D,
				00000000000000000000000E,
			);
			defaultConfigurationName = Release;
		};
/* End XCConfigurationList section */
	};
	rootObject = 000000000000000000000009;
}
EOF
          
          mkdir -p temp.xcodeproj
          mv temp/project.pbxproj temp.xcodeproj/

      - name: Build with xcodebuild
        run: |
          xcodebuild \
            -project temp.xcodeproj \
            -target ChengFengAI \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Package as IPA
        run: |
          APP_PATH=$(find build/Release-iphoneos -name "*.app" -type d | head -1)
          mkdir -p IPA/Payload
          cp -R "$APP_PATH" IPA/Payload/
          cd IPA
          zip -r ChengFengAI.ipa Payload
          ls -lh ChengFengAI.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ChengFengAI-iOS-IPA
          path: IPA/ChengFengAI.ipa
          if-no-files-found: error