name: 乘风AI - IPA 自动打包

# 触发条件：任何推送都触发
on:
  push:
    branches: [ main, master, develop ]
  workflow_dispatch:

# 环境变量
env:
  PROJECT_NAME: "ChengFengAI"
  SOURCE_DIR: "乘风AI"
  SCHEME: "乘风AI"

# Job 定义
jobs:

  # ============ 核心：直接打包 IPA（最可靠的方式） ============
  build-ipa:
    name: 生成 IPA (可侧装 iPhone)
    runs-on: macos-15
    steps:

      # --- 1. 检出代码 ---
      - name: 📥 检出代码
        uses: actions/checkout@v4

      # --- 2. 检查环境 ---
      - name: 🔍 检查 Xcode 和 SDK
        run: |
          echo "=== Xcode 版本 ==="
          xcodebuild -version
          echo ""
          echo "=== 可用 iOS SDK ==="
          xcodebuild -showsdks 2>&1 | grep -i "ios" || true
          echo ""
          echo "=== 可用模拟器 ==="
          xcrun simctl list devices available 2>&1 | head -5 || true

      # --- 3. 安装 xcodegen ---
      - name: 🛠️ 安装 XcodeGen
        run: |
          brew install xcodegen
          xcodegen --version

      # --- 4. 生成 Xcode 项目 ---
      - name: 📋 生成 Xcode 项目
        run: |
          echo "=== 生成前文件列表 ==="
          ls -la
          echo ""
          xcodegen generate --spec project.yml
          echo ""
          echo "=== 生成后项目文件 ==="
          ls -la *.xcodeproj 2>&1 || echo "(未找到 .xcodeproj)"

      # --- 5. 验证项目 ---
      - name: ✅ 验证 scheme 和 target
        run: |
          echo "=== 项目 targets ==="
          xcodebuild -list -project "${{ env.SOURCE_DIR }}.xcodeproj" 2>&1 || true
          echo ""
          echo "=== 项目 schemes ==="
          xcodebuild -list -project "${{ env.SOURCE_DIR }}.xcodeproj" 2>&1 | grep -A 20 "Schemes:" || true

      # --- 6. 真机 Archive（iphoneos SDK，不签名） ---
      - name: 📦 真机 Archive (Release)
        run: |
          mkdir -p build-output
          xcodebuild \
            -project "${{ env.SOURCE_DIR }}.xcodeproj" \
            -scheme "${{ env.SCHEME }}" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "build-output/${{ env.SOURCE_DIR }}.xcarchive" \
            -derivedDataPath "build-output/derived" \
            clean archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ENABLE_HARDENED_RUNTIME=NO \
            DEVELOPMENT_TEAM="" \
            2>&1 | tail -80
          EXIT_CODE=${PIPESTATUS[0]}
          echo ""
          echo "=== Archive 退出码: $EXIT_CODE ==="
          echo ""
          echo "=== Archive 产物检查 ==="
          ls -la "build-output/" 2>&1 || true
          if [ -d "build-output/${{ env.SOURCE_DIR }}.xcarchive" ]; then
            echo "✓ .xcarchive 存在"
            echo "=== Archive 内容 ==="
            ls -la "build-output/${{ env.SOURCE_DIR }}.xcarchive/" 2>&1 || true
            if [ -d "build-output/${{ env.SOURCE_DIR }}.xcarchive/Products/Applications" ]; then
              echo "✓ Products/Applications 存在"
              APP_COUNT=$(ls "build-output/${{ env.SOURCE_DIR }}.xcarchive/Products/Applications/" 2>&1 | wc -l | tr -d ' ')
              echo "  App 数量: $APP_COUNT"
            else
              echo "✗ Products/Applications 不存在"
            fi
          else
            echo "✗ .xcarchive 不存在"
          fi
          exit $EXIT_CODE

      # --- 7. 从 Archive 提取 .app 并打包成 IPA ---
      - name: 📲 打包 IPA (Payload 方式，无需开发者账号)
        run: |
          XCARCHIVE="build-output/${{ env.SOURCE_DIR }}.xcarchive"
          APP_PATH=""
          # 查找 .app
          if [ -d "$XCARCHIVE/Products/Applications" ]; then
            for app in "$XCARCHIVE/Products/Applications/"*.app; do
              if [ -d "$app" ]; then
                APP_PATH="$app"
                break
              fi
            done
          fi
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: 未在 Archive 中找到 .app"
            echo "=== 完整目录树 ==="
            find "$XCARCHIVE" -maxdepth 4 -type d 2>&1 | head -50 || true
            exit 1
          fi
          echo "✓ 找到 App: $(basename "$APP_PATH")"

          # 构建 Payload 目录 → IPA
          mkdir -p build-ipa/Payload
          cp -R "$APP_PATH" "build-ipa/Payload/"
          echo "✓ 已复制到 Payload"

          # 检查并确保可执行权限
          APP_NAME=$(basename "$APP_PATH")
          EXEC_NAME=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "build-ipa/Payload/$APP_NAME/Info.plist" 2>/dev/null || echo "${{ env.SOURCE_DIR }}")
          chmod +x "build-ipa/Payload/$APP_NAME/$EXEC_NAME" 2>/dev/null || true
          echo "✓ 可执行文件: $EXEC_NAME"

          # ZIP 压缩 = IPA
          cd build-ipa && zip -qr "${{ env.PROJECT_NAME }}.ipa" . && cd ..
          mkdir -p final-output
          cp "build-ipa/${{ env.PROJECT_NAME }}.ipa" "final-output/${{ env.PROJECT_NAME }}.ipa"

          SIZE=$(du -h "final-output/${{ env.PROJECT_NAME }}.ipa" | cut -f1)
          echo ""
          echo "✅ IPA 生成成功：final-output/${{ env.PROJECT_NAME }}.ipa ($SIZE)"
          echo ""
          echo "=== IPA 结构检查 ==="
          ls -lh "final-output/${{ env.PROJECT_NAME }}.ipa"
          echo ""
          echo "=== Payload 内容 ==="
          unzip -l "final-output/${{ env.PROJECT_NAME }}.ipa" | head -20

      # --- 8. 上传 IPA ---
      - name: 📤 上传 IPA (可直接侧装 iPhone)
        uses: actions/upload-artifact@v4
        with:
          name: "ChengFengAI-iOS-IPA"
          path: "final-output/*.ipa"

      # --- 9. 上传 Archive 调试产物 ---
      - name: 📤 上传 Archive (调试用)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "ChengFengAI-iOS-Archive"
          path: "build-output/*.xcarchive"

  # ============ 代码统计（独立运行，不影响 IPA） ============
  stats:
    name: 代码统计
    runs-on: ubuntu-latest
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
      - name: 📊 统计
        run: |
          echo "=== 乘风AI 项目统计 ==="
          echo ""
          echo "Swift 文件: $(find . -name "*.swift" -not -path "./.git/*" | wc -l) 个"
          echo "Swift 代码行数:"
          find . -name "*.swift" -not -path "./.git/*" -exec wc -l {} + 2>&1 | tail -1
          echo ""
          echo "YAML 配置: $(find . -name "*.yml" -not -path "./.git/*" | wc -l) 个"
          echo ""
          echo "=== 关键文件 ==="
          find . -maxdepth 3 -type f -not -path "./.git/*" | sort | head -30
