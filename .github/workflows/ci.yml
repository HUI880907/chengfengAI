name: ChengFengAI - iOS IPA Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ipa:
    name: Build iOS IPA
    runs-on: macos-15
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Build with Swift Package Manager
        run: |
          echo "=== Building with Swift PM ==="
          swift build \
            -Xswiftc "-target" \
            -Xswiftc "arm64-apple-ios16.0" \
            -Xswiftc "-sdk" \
            -Xswiftc "$(xcrun --sdk iphoneos --show-sdk-path)"

      - name: Create .app bundle
        run: |
          mkdir -p ChengFengAI.app
          cp .build/arm64-apple-ios16.0/debug/ChengFengAI ChengFengAI.app/ChengFengAI
          cp ChengFengAI/Info.plist ChengFengAI.app/Info.plist
          printf 'APPL????' > ChengFengAI.app/PkgInfo
          codesign --force --deep --sign - ChengFengAI.app 2>&1 || true

      - name: Package as IPA
        run: |
          mkdir -p IPA/Payload
          cp -R ChengFengAI.app IPA/Payload/
          cd IPA
          zip -r ChengFengAI.ipa Payload
          ls -lh ChengFengAI.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ChengFengAI-iOS-IPA
          path: IPA/ChengFengAI.ipa
          if-no-files-found: error